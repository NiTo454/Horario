<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="purpleGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="128" fill="url(#purpleGradient)" />
  
  <!-- Medical Cross and Heart design -->
  <g transform="translate(106, 96)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stethoscope Heart shape -->
    <path d="M150,55 C110,10 40,10 15,55 C-15,110 35,185 150,270 C265,185 315,110 285,55 C260,10 190,10 150,55 Z" stroke-width="26" />
    
    <!-- Medical Cross in the center -->
    <path d="M125,100 H175 V150 H125 Z M125,100 H175 M125,150 H175 M125,100 V150 M175,100 V150" fill="#ffffff" stroke="none" />
    <path d="M150,75 V175 M100,125 H200" stroke-width="20" />
    
    <!-- Pulse wave under -->
    <path d="M60,200 L95,200 L110,170 L125,230 L140,185 L150,200 L240,200" stroke-width="16" />
  </g>
</svg>
